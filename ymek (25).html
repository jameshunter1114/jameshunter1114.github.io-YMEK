  --ember:    #c44010;
  --gold:     #8a5c00;
  --violet:   #5830b4;
  --sky:      #1a6fbb;
  --rose:     #b03080;
}
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--font-body); overflow-x: hidden;
    background-image:
      radial-gradient(ellipse 80% 40% at 50% 110%, rgba(26,210,180,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 60% 30% at 10% 100%, rgba(245,166,35,0.04) 0%, transparent 60%);
  }
  :root.light body, body:has(:root.light) {
    background-image: none;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(26,210,180,0.2); border-radius: 2px; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(16px);} to { opacity:1; transform:none;} }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes shimmer {
    0%   { background-position: -400px 0; }
    100% { background-position:  400px 0; }
  }
  @keyframes scanLine { 0%,100%{top:10%} 50%{top:85%} }
  .fade-up { animation: fadeUp .45s ease both; }

  .tab-btn {
    background: none; border: 1px solid transparent; cursor: pointer;
    font-family: var(--font-head); font-size: 10px; font-weight: 700;
    letter-spacing: .1em; text-transform: uppercase;
    padding: 7px 14px; border-radius: 6px; transition: all .2s;
    color: var(--muted);
  }
  .tab-btn:hover { color: var(--teal); border-color: rgba(26,210,180,0.25); }
  .tab-btn.active { color: var(--fg, #060d0e); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px; padding: 22px; animation: fadeUp .4s ease both;
    position: relative; overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; inset: 0; border-radius: 14px; pointer-events: none;
    background: radial-gradient(circle at 0% 0%, rgba(26,210,180,0.04), transparent 60%);
  }
  .card-title {
    font-family: var(--font-head); font-size: 10px; font-weight: 700;
    letter-spacing: .18em; text-transform: uppercase; color: var(--muted);
    margin-bottom: 14px;
  }

  input, textarea, select {
    background: rgba(17,32,40,0.8); border: 1px solid rgba(26,210,180,0.15);
    color: var(--text); font-family: var(--font-body); border-radius: 8px;
    padding: 10px 14px; width: 100%; outline: none; font-size: 14px;
    transition: border .2s, box-shadow .2s;
  }
  input:focus, textarea:focus, select:focus {
    border-color: rgba(26,210,180,0.5);
    box-shadow: 0 0 0 3px rgba(26,210,180,0.08);
  }
  textarea { resize: vertical; min-height: 80px; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
    border: none; font-family: var(--font-head); font-weight: 700;
    font-size: 10px; letter-spacing: .1em; text-transform: uppercase;
    border-radius: 8px; padding: 10px 20px; transition: all .18s; white-space: nowrap;
  }
  .btn:hover { filter: brightness(1.15); transform: translateY(-1px); }
  .btn:active { transform: none; filter: brightness(.9); }
  .btn-primary  { background: linear-gradient(135deg,#1ad2b4,#0ea896); color: #060d0e; box-shadow: 0 0 16px rgba(26,210,180,0.35); }
  .btn-secondary{ background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-gold     { background: linear-gradient(135deg,#f5a623,#d4861a); color: #1a0800; box-shadow: 0 0 14px rgba(245,166,35,0.3); }
  .btn-mint     { background: linear-gradient(135deg,#1ad2b4,#0ea896); color: #060d0e; }
  .btn-violet   { background: linear-gradient(135deg,#9b6fff,#6b3fff); color: #fff; box-shadow: 0 0 14px rgba(155,111,255,0.3); }

  .priority-badge {
    display: inline-block; font-size: 9px; font-weight: 700;
    letter-spacing: .1em; text-transform: uppercase;
    padding: 3px 9px; border-radius: 4px;
  }
  .p-critical { background: rgba(255,107,53,.18); color: var(--ember,#ff6b35); border: 1px solid rgba(255,107,53,.3); }
  .p-high     { background: rgba(245,166,35,.15); color: var(--gold);  border: 1px solid rgba(245,166,35,.3); }
  .p-medium   { background: rgba(26,210,180,.12); color: var(--teal,#1ad2b4);  border: 1px solid rgba(26,210,180,.25); }
  .p-low      { background: rgba(155,111,255,.12); color: var(--violet); border: 1px solid rgba(155,111,255,.2); }

  .mood-btn {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px; cursor: pointer;
    font-size: 22px; transition: all .18s; display: flex; flex-direction: column;
    align-items: center; gap: 4px;
  }
  .mood-btn span { font-size: 9px; font-family: var(--font-head); font-weight: 700; letter-spacing:.08em; color: var(--muted); text-transform: uppercase; }
  .mood-btn:hover, .mood-btn.selected {
    border-color: var(--gold); background: rgba(245,166,35,0.08);
    box-shadow: 0 0 12px rgba(245,166,35,0.2);
  }

  .progress-bar { background: rgba(26,210,180,0.08); border-radius: 99px; overflow: hidden; height: 6px; }
  .progress-fill {
    height: 100%; border-radius: 99px; transition: width .6s ease;
  }

  .ai-bubble {
    background: linear-gradient(135deg, rgba(155,111,255,.1), rgba(74,184,255,.06));
    border: 1px solid rgba(155,111,255,.22); border-radius: 14px;
    padding: 16px 18px; font-size: 14px; line-height: 1.7;
    color: #c8e8e2; animation: fadeUp .4s ease;
  }
  .ai-loading {
    background: linear-gradient(90deg, var(--surface2) 25%, var(--surface) 50%, var(--surface2) 75%);
    background-size: 400px 100%; animation: shimmer 1.4s infinite linear;
    border-radius: 8px; height: 14px;
  }
  .spinner {
    width: 18px; height: 18px; border: 2px solid rgba(26,210,180,0.2);
    border-top-color: var(--teal,#1ad2b4); border-radius: 50%; animation: spin .7s linear infinite;
  }

  .cal-day {
    aspect-ratio: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; border-radius: 10px; cursor: pointer; font-size: 13px;
    font-family: var(--font-head); font-weight: 600; gap: 2px;
    transition: all .15s; position: relative;
  }
  .cal-day:hover { background: var(--surface2); color: var(--teal,#1ad2b4); }
  .cal-day.today { background: linear-gradient(135deg,#1ad2b4,#0ea896); color: #060d0e; box-shadow: 0 0 14px rgba(26,210,180,0.5); }
  .cal-day.has-event::after {
    content: ''; width: 4px; height: 4px; border-radius: 50%;
    background: var(--gold); position: absolute; bottom: 3px; box-shadow: 0 0 4px var(--gold);
  }

  .metric-ring {
    position: relative; width: 80px; height: 80px;
  }
  .metric-ring svg { transform: rotate(-90deg); }
  .metric-ring-label {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
  }

  .chart-bar {
    background: rgba(26,210,180,0.05); border-radius: 4px 4px 0 0;
    flex: 1; display: flex; align-items: flex-end; overflow: hidden;
    min-height: 60px;
  }
  .chart-fill {
    width: 100%; border-radius: 6px 6px 0 0; transition: height .5s ease;
  }

  .tag { display: inline-block; font-size: 11px; padding: 2px 8px;
    border-radius: 6px; font-weight: 600; }

  .glow-teal   { box-shadow: 0 0 24px rgba(26,210,180,0.3), 0 0 2px rgba(26,210,180,0.4) inset; }
  .glow-gold   { box-shadow: 0 0 20px rgba(245,166,35,0.3); }
  .glow-violet { box-shadow: 0 0 20px rgba(155,111,255,0.28); }
  .glow-ember  { box-shadow: 0 0 20px rgba(255,107,53,0.28); }
  .rune-divider {
    border: none; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(26,210,180,0.3), transparent);
    margin: 16px 0;
  }

  @media (max-width: 700px) {
    header { padding: 14px 12px 0 !important; gap: 8px !important; }
    header > div:last-child { gap: 4px !important; flex-wrap: wrap !important; }
    .tab-group-bar { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .tab-group-bar::-webkit-scrollbar { display: none; }
    [style*="1fr 320px"],[style*="320px 1fr"],[style*="1fr 340px"],
    [style*="1fr 380px"],[style*="1fr 240px"],[style*="1fr 280px"] {
      grid-template-columns: 1fr !important;
    }
    .card { padding: 14px !important; }
  }
  @media (max-width: 480px) {
    .btn { font-size: 12px !important; padding: 7px 12px !important; }
    header svg { width: 38px !important; height: 38px !important; }
  }

  /* \u2500\u2500 Light mode overrides \u2500\u2500 */
  :root.light .card { box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  :root.light .btn-secondary { color: var(--fg); }
  :root.light .btn-primary { color: #fff; }
  :root.light .progress-bar { background: rgba(0,0,0,0.10); }
  :root.light input, :root.light select, :root.light textarea {
    background: #fff; color: var(--fg); border-color: rgba(0,0,0,0.18);
  }
  :root.light input::placeholder { color: #8aabaf; }
  :root.light .spinner { border-color: rgba(0,0,0,0.12); border-top-color: var(--mint); }
  :root.light .ai-loading { background: linear-gradient(90deg, #e0eaec 25%, #f0f6f7 50%, #e0eaec 75%); }
  :root.light nav[style*="position:fixed"], :root.light nav[style*='position:"fixed"'] {
    background: rgba(242,245,246,0.95) !important;
  }

data as a JSON file",steps:[{heading:"How to export a backup",body:"Click the \u2B07 Backup button in the header. Your browser will download a file called ymek-backup-[date].json. This contains all your tasks, events, journals, fitness data, body logs, workouts, memories, quests, avatar preferences, and goals."},{heading:"How to restore from a backup",body:"Click the \u2B06 Restore button in the header. Select your .json backup file. All data is immediately restored. If any data type is missing from the file it is simply skipped \u2014 nothing is overwritten unless the file contains it."},{heading:"What is NOT included",body:"Your Fitbit OAuth token and Client ID are stored separately and not included in the backup for security. AEMEK chat history is also not backed up \u2014 only the extracted memory notes are."},{heading:"When should I back up?",body:"Before clearing your browser data, switching devices, or sharing the HTML file with someone else. Since all data lives in localStorage, it does not sync across devices automatically."}]},{id:"barcode",icon:"\u{1F4F7}",title:"Barcode Scanner & Food Lookup",color:c.rose,summary:"Scan food barcodes to auto-fill nutrition data",steps:[{heading:"Where is the scanner?",body:"Go to the \u{1F4CA} Track group \u2192 \u{1F4AA} Fitness tab. Below the daily metrics you will find a Meal Log section with a \u{1F4F7} Scan Barcode button."},{heading:"First time setup",body:"When you first tap Scan Barcode, your browser will ask for camera permission. You must allow this. On desktop this uses your webcam; on mobile it will use the rear camera if supported."},{heading:"How to scan",body:"Point the camera at the barcode on the food packaging. The scanner uses the BarcodeDetector Web API \u2014 if your browser does not support it, you will see a fallback message. Once detected, it looks up the product on Open Food Facts and fills in the food name automatically."},{heading:"Manual food entry",body:"You can also type a food name directly into the meal input field and press Enter or click Add Meal. Each meal is timestamped and shown in your daily log."}]},{id:"body",icon:"\u{1F4D0}",title:"Body Metrics",color:c.coral,summary:"Logging measurements and reading progress deltas",steps:[{heading:"What can I log?",body:"Weight (lbs), Body Fat %, Chest, Waist, Hips, Neck, Arms, and Thighs (all in inches). You do not need to fill every field \u2014 log only what you want to track."},{heading:"How often should I log?",body:"Weekly is ideal for most metrics. Daily weight logging is fine but expect natural fluctuation of 1\u20133 lbs day-to-day from water and food \u2014 look at the weekly trend, not individual days."},{heading:"Reading the delta arrows",body:"Each metric shows a \u25B2 or \u25BC compared to the previous entry. Green means improving: for weight, waist, hips, and body fat \u2014 going DOWN is green. For chest, arms, and thighs \u2014 going UP is green (muscle gain). Red means the opposite direction."},{heading:"Where does this data appear?",body:"The Insights tab shows a weight sparkline and a latest measurements panel. The Fitness tab shows a read-only card with your most recent weight. AEMEK also has access to your full body log for progress advice."}]},{id:"journal-tags",icon:"\u{1F3F7}",title:"Journal Tags",color:c.teal,summary:"Tagging entries and filtering your journal history",steps:[{heading:"Adding tags to an entry",body:"In the Journal tab, after writing your entry, type a tag in the tag input field (below the text area) and press Enter or click Add. Tags appear as mint-coloured chips. You can add as many as you like."},{heading:"Removing a tag",body:"Click the \xD7 on any tag chip to remove it from the entry. Tags are saved automatically with the entry."},{heading:"Filtering by tag",body:"In the journal history sidebar on the right, a filter row shows all tags you have used across all entries. Click a tag to filter the list to only entries with that tag. Click it again or click the \xD7 to clear the filter."},{heading:"Tag cloud in Insights",body:"The Insights tab has a \u{1F3F7} Journal Tags card that shows all your tags sized by frequency. Tags used within the current date range are highlighted in teal. Tap the date range buttons at the top of Insights to change the window."}]},{id:"quests",icon:"\u{1F3AF}",title:"Daily Quest Board",color:c.ember,summary:"Generating quests, earning XP, and understanding categories",steps:[{heading:"Generating quests",body:"Go to the Quests tab and tap \u26A1 Generate Today's Quests. AEMEK generates 5 personalised quests based on your mood, recent fitness vitals, workout history, body trend, overdue tasks, and journal entries. Each session regenerates for today only."},{heading:"Quest categories",body:"Quests are tagged as: Mind (journaling, reflection), Body (fitness, movement), Focus (tasks, deep work), Rest (sleep, recovery), or Growth (habits, learning). Each has its own colour coding."},{heading:"Difficulty and XP",body:"Each quest is rated Easy (10 XP), Medium (25 XP), or Hard (50 XP). Completing a quest marks it done and adds XP to your running total visible as the \u26A1 badge on the Dashboard."},{heading:"Regenerating quests",body:"Tap \u21BA Regenerate at any time to get a fresh set. Your completed quests for the day are preserved in the XP total even after regenerating."}]},{id:"aemek-memory",icon:"\u{1F9E0}",title:"AEMEK Memory System",color:c.violet,summary:"How AEMEK remembers you across sessions, auto-digest, and pinning",steps:[{heading:"How memories work",body:"Memories are short text facts that persist between every AEMEK session and are injected into every conversation. They tell AEMEK things about you it would otherwise forget when the chat resets."},{heading:"Automatic memory saving",body:"During any conversation, if AEMEK learns something worth remembering it will include [MEMORY: fact here] in its reply. This is silently stripped from the visible message and saved as a memory tagged \u{1F916} auto."},{heading:"Manual memory adding",body:"Open the \u{1F9E0} memory panel (top of the AEMEK chat), type a fact in the input, and press Enter or + Add. Example: I work night shifts. These are tagged \u270D\uFE0F manual."},{heading:"Auto-digest",body:"Click \u2728 Auto-digest 7 days in the memory panel to have AEMEK analyse your last week of data \u2014 fitness, journals, workouts, body \u2014 and automatically extract 3\u20135 persistent facts worth remembering. These are tagged \u2728 digest."},{heading:"Pinning core facts",body:"Click the \u2605 next to any memory to pin it as a core fact. Pinned memories are always included in every conversation regardless of how many total memories you have. Unpinned memories are recency-limited to the 10 most recent. Pin things like your name, health conditions, or long-term goals."},{heading:"Chat persistence",body:"Your conversation history is now saved between sessions. Up to 60 messages are kept. Use the \u{1F5D1} Clear button in the AEMEK header to reset the chat without losing your saved memories."}]},{id:"apple-health",icon:"\u{1F4F1}",title:"Apple Health / iPhone Sync",color:c.mint,summary:"Syncing sleep, steps and calories from Apple Watch using iOS Shortcuts",steps:[{heading:"Why a Shortcut?",body:"Apple restricts HealthKit access to native iOS apps. A web page cannot read it directly. Instead, an iOS Shortcut reads the data and copies it as JSON to your clipboard. YMEK then reads the clipboard."},{heading:"Build the Shortcut",body:'Open the Shortcuts app on your iPhone. Create a new Shortcut and add these actions in order: (1) Find Health Samples where type is Sleep Analysis, (2) Find Health Samples where type is Steps, (3) Find Health Samples where type is Active Energy Burned, (4) Text action with content: {"sleep":[Shortcuts.sleepHours],"steps":[Shortcuts.steps],"calories":[Shortcuts.calories]}, (5) Copy to Clipboard.'},{heading:"Using the Shortcut",body:"Each morning, run the Shortcut on your iPhone. It takes under a second. Then open YMEK on your computer or browser, go to the AEMEK tab, and click \u{1F4CB} Paste from Health App in the Health Sync card. Your sleep, steps, and calories fill in automatically for today."},{heading:"Expected JSON format",body:'The clipboard must contain valid JSON with one or more of these keys: sleep (decimal hours, e.g. 7.5), steps (integer), calories (integer), energy (1\u201310 scale), water (cups). Unknown keys are ignored. Example: {"sleep":7.2,"steps":9341,"calories":1820}'}]},{id:"fitbit",icon:"\u231A",title:"Fitbit Integration",color:"#00b4d8",summary:"Connecting Fitbit to auto-sync sleep, steps and calories",steps:[{heading:"Step 1 \u2014 Register a free app",body:"Go to dev.fitbit.com/apps/new and sign in with your Fitbit account. Fill in the app details: Name (e.g. YMEK), Description (personal use), Application Website (any URL), OAuth 2.0 Application Type: Personal, Callback URL: the full URL of your ymek.html file (e.g. file:///Users/you/ymek.html). Save the app and copy the OAuth 2.0 Client ID shown."},{heading:"Step 2 \u2014 Enter your Client ID",body:"In YMEK, go to the AEMEK tab. In the right sidebar, find the \u231A Fitbit Sync card. Paste your Client ID and click Save."},{heading:"Step 3 \u2014 Connect",body:"Click \u{1F517} Connect Fitbit. You will be redirected to Fitbit's login page. Sign in and approve the permissions for sleep, activity, and heart rate. You will be redirected back to YMEK with the connection active."},{heading:"Daily sync",body:"Each day, click \u21BB Sync Today in the Fitbit card. This pulls your sleep duration, step count, and calories burned for today and fills them into the Fitness tab automatically. The token lasts 7 days before needing to reconnect."},{heading:"Troubleshooting",body:"If sync fails with a token error, click Disconnect and reconnect. Make sure the Callback URL in your Fitbit app settings exactly matches the URL you are opening YMEK from \u2014 including whether it starts with file:// or https://."}]}],r=e.trim()?o.filter(function(s){var u=e.toLowerCase();return s.title.toLowerCase().indexOf(u)>=0||s.summary.toLowerCase().indexOf(u)>=0||s.steps.some(function(g){return g.body.toLowerCase().indexOf(u)>=0})}):o;return n.createElement("div",{style:{maxWidth:800}},n.createElement("div",{style:{marginBottom:24}},n.createElement("h1",{style:{fontFamily:"var(--font-head)",fontSize:26,fontWeight:900,marginBottom:6,background:"linear-gradient(90deg, "+c.mint+", "+c.violet+")",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}},"\u{1F4D6} YMEK How-To Guide"),n.createElement("p",{style:{color:"var(--muted)",fontSize:13}},"Step-by-step guides for every feature. Click any card to expand.")),n.createElement("div",{style:{position:"relative",marginBottom:20}},n.createElement("input",{placeholder:"Search guides\u2026 (e.g. streak, Fitbit, tags)",value:e,onChange:function(s){a(s.target.value),l(null)},style:{width:"100%",paddingLeft:36,fontSize:14}}),n.createElement("span",{style:{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:15,color:"var(--muted)",pointerEvents:"none"}},"\u{1F50D}"),e&&n.createElement("button",{onClick:function(){a("")},style:{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"var(--muted)",cursor:"pointer",fontSize:16}},"\xD7")),e&&n.createElement("div",{style:{fontSize:12,color:"var(--muted)",marginBottom:14}},r.length," result",r.length!==1?"s":"",' for "',e,'"'),n.createElement("div",{style:{display:"flex",flexDirection:"column",gap:10}},r.map(function(s){var u=i===s.id;return n.createElement("div",{key:s.id,className:"card",style:{padding:0,overflow:"hidden",borderLeft:"3px solid "+s.color,transition:"box-shadow .2s"}},n.createElement("div",{onClick:function(){l(u?null:s.id)},style:{display:"flex",alignItems:"center",gap:14,padding:"16px 20px",cursor:"pointer",userSelect:"none"}},n.createElement("span",{style:{fontSize:22,flexShrink:   function getMain() {
    return document.querySelector("main");
  }

  function ensureDiv() {
    if (planDiv && planDiv.parentNode) return;
    planDiv = document.createElement("div");
    planDiv.id = "plan-tab-portal";
    planDiv.style.cssText = "display:none;flex:1;padding:20px 16px 80px;overflow:auto;";
  }

  function showPlan() {
    ensureDiv();
    var main = getMain();
    if (!main) return;

    // Insert planDiv as sibling of main, inside same parent
    if (!planDiv.parentNode) {
      main.parentNode.insertBefore(planDiv, main.nextSibling);
    }

    main.style.display = "none";
    planDiv.style.display = "block";

    if (!planRoot) planRoot = ReactDOM.createRoot(planDiv);

    var habits = [], habitLogs = {};
    try { habits   = JSON.parse(localStorage.getItem("ld_habits") || "[]"); }    catch(e){}
    try { habitLogs = JSON.parse(localStorage.getItem("ld_habit_logs") || "{}"); } catch(e){}

    planRoot.render(React.createElement(WeeklyPlanTab, { habits: habits, habitLogs: habitLogs }));
    isShowing = true;
  }

  function hidePlan() {
    if (!isShowing) return;
    var main = getMain();
    if (main) main.style.display = "";
    if (planDiv) planDiv.style.display = "none";
    isShowing = false;
  }

  window.showYMEKPlan = showPlan;
  window.hideYMEKPlan = hidePlan;

  function injectPlanTab() {
    var attempts = 0;
    var iv = setInterval(function() {
      attempts++;
      if (attempts > 40) { clearInterval(iv); return; }

      var allBtns = Array.from(document.querySelectorAll("button"));
      var tasksBtn = allBtns.find(function(b) {
        return b.textContent && b.textContent.trim().match(/Tasks/);
      });
      if (!tasksBtn) return;

      var subBar = tasksBtn.parentElement;
      if (!subBar) return;
      if (document.getElementById("plan-sub-btn")) { clearInterval(iv); return; }

      var btn = document.createElement("button");
      btn.id = "plan-sub-btn";
      btn.textContent = "📅 Plan";
      btn.style.cssText = [
        "padding:5px 14px",
        "border-radius:8px",
        "border:none",
        "cursor:pointer",
        "font-size:11px",
        "font-weight:700",
        "white-space:nowrap",
        "background:transparent",
        "color:var(--muted)",
        "border-bottom:2px solid transparent",
        "font-family:inherit",
        "transition:all .15s"
      ].join(";");

      btn.onclick = function() {
        if (isShowing) {
          hidePlan();
          btn.style.background = "transparent";
          btn.style.color = "var(--muted)";
          btn.style.borderBottomColor = "transparent";
        } else {
          // Deactivate all other sub-tab buttons
          subBar.querySelectorAll("button").forEach(function(b) {
            b.style.background = "transparent";
            b.style.borderBottomColor = "transparent";
          });
          btn.style.background = "rgba(26,210,180,0.2)";
          btn.style.color = "#1ad2b4";
          btn.style.borderBottomColor = "#1ad2b4";
          showPlan();
        }
      };

      subBar.appendChild(btn);

      // Hide plan when other sub-tabs clicked
      subBar.querySelectorAll("button:not(#plan-sub-btn)").forEach(function(b) {
        b.addEventListener("click", function() {
          hidePlan();
          btn.style.background = "transparent";
          btn.style.color = "var(--muted)";
          btn.style.borderBottomColor = "transparent";
        });
      });

      // Hide plan when bottom nav section changes
      var bottomNav = document.querySelector("nav");
      if (bottomNav) {
        bottomNav.querySelectorAll("button").forEach(function(b) {
          b.addEventListener("click", function() {
            hidePlan();
            btn.style.background = "transparent";
            btn.style.color = "var(--muted)";
            btn.style.borderBottomColor = "transparent";
          });
        });
      }

      clearInterval(iv);
      console.log("✓ Plan tab injected into Planner");
    }, 400);
  }

  setTimeout(injectPlanTab, 1200);
})();
</script>

  });

  return syncRes.ok;
};

var supaPullData = async function() {
  var token = localStorage.getItem("ymek_access_token");

    headers: Object.assign(supaHeaders(), {"Authorization": "Bearer " + token})
  });

  return rows[0] || null;
};

        var refreshed = await window.ymekAuth.refreshSession();
        if (refreshed) {
          window.ymekCurrentUser = refreshed.user;
          setTimeout(addSignOutButton, 2000);
          return;
        }
      } catch(e) {}
    }

    // No valid session — show auth screen
    // Wait for React app to mount first
    setTimeout(showAuthScreen, 800);
  }

  // Add sign out to the app header
  function injectSignOutBtn() {
    setTimeout(function() {
      var allBtns = Array.from(document.querySelectorAll("button"));
      var setupBtn = allBtns.find(function(b){ return b.textContent && b.textContent.includes("↺"); });
      if (!setupBtn || document.getElementById("signout-btn")) return;

      var btn = document.createElement("button");
      btn.id = "signout-btn";
      btn.className = "btn btn-secondary";
      btn.style.cssText = "font-size:10px;";
      btn.textContent = "⏏ Sign out";
      btn.onclick = async function() {
        if (!confirm("Sign out of YMEK?")) return;
        await window.ymekAuth.signOut();
        window.ymekCurrentUser = null;
        showAuthScreen();
      };
      setupBtn.parentNode.insertBefore(btn, setupBtn);
    }, 2000);
  }

  // Auto-sync to Supabase every 5 minutes when signed in
  function startAutoSync() {
    setInterval(async function() {
      if (!window.ymekCurrentUser) return;
      if (!window.ymekAuth.getToken()) return;
      try {
        var allData = {};
        var keys = ["ld_tasks","ld_events","ld_journals","ld_fitness","ld_goals",
          "ld_reminders","ld_quests","ld_workouts","ld_body","ld_aemek_memory",
          "ld_habits","ld_habit_logs","ld_fin_accounts","ld_fin_tx","ld_fin_budgets",
          "ld_fin_goals","ld_custom_metrics","ld_custom_logs","ld_wisdom","ld_time_logs",
          "ld_weekly_plan"];
        keys.forEach(function(k) {
          var v = localStorage.getItem(k);
          if (v) { try { allData[k] = JSON.parse(v); } catch(e) {} }
        });
        allData.syncedAt = new Date().toISOString();
        await window.ymekAuth.syncData(allData);
        console.log("✓ Auto-synced to Supabase");
      } catch(e) {
        console.log("Auto-sync failed:", e.message);
      }
    }, 5 * 60 * 1000); // every 5 minutes
  }

  // Expose pull function for manual sync
  window.ymekPullFromCloud = async function() {
    if (!window.ymekCurrentUser) { alert("Sign in first to sync."); return; }
    try {
      var result = await window.ymekAuth.pullData();
      if (!result || !result.data) { alert("No cloud data found."); return; }
      var d = result.data;
      Object.keys(d).forEach(function(k) {
        if (k !== "syncedAt") localStorage.setItem(k, JSON.stringify(d[k]));
      });
      alert("✓ Data pulled from cloud. Reloading…");
      setTimeout(function(){ window.location.reload(); }, 500);
    } catch(e) {
      alert("Pull failed: " + e.message);
    }
  };

  init().then(function() {
    injectSignOutBtn();
    startAutoSync();
  });
})();
</script>
</body>
